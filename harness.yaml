setup_cmd: "sudo apt-get update && sudo apt-get install -y clang libclang-19-dev && pip install pillow onnxruntime librosa gguf huggingface_hub openai torch safetensors transformers libclang && sudo -E PYTHONPATH=. python3 ./extra/sqtt/install_rocprof_decoder.py"
build_cmd: "python3 setup.py build || echo 'No build required'"
test_cmd: "LIBCLANG_PATH=/usr/lib/llvm-19/lib/libclang.so CPU=1 PYTHONUNBUFFERED=1 python3 -m pytest --timeout=120 --timeout-method=thread test/backend/ test/unit/ test/null/ test/test_tiny.py"
lint_cmd: "ruff check ."
