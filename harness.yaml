build_cmd: python3 setup.py build || echo 'No build required'
lint_cmd: python3 -m ruff check . --extend-select F401 --fix || true; python3 -m ruff check .
setup_cmd: sudo apt-get update && sudo apt-get install -y clang libclang-19-dev && pip install ruff pillow onnxruntime librosa gguf huggingface_hub pytest-xdist pytest-timeout openai torch safetensors transformers libclang pytest-cov coverage && sudo -E PYTHONPATH=. python3 ./extra/sqtt/install_rocprof_decoder.py
test_cmd: rm -f /dev/shm/coralnpu_$$_* ; { for test_file in test/test_tinygrad_hardware_blockers.py test/backend/ test/unit/ test/null/ test/test_tiny.py test/test_coralnpu_e2e.py test/test_coralnpu_renderer.py test/test_ping_pong_address_overlap.py test/test_pytest_xdist_teardown_integration.py test/test_cross_compiler_matrix.py test/models/test_gemma_decomposition.py test/test_coralnpu_ipc.py test/test_coralnpu_suites.py test/test_w8a8_late_dequantization.py test/test_coral_macros.py test/test_tuner_gradients.py test/test_sequential_dependencies.py; do rm -f /dev/shm/coralnpu_$$_* && env LIBCLANG_PATH=/usr/lib/llvm-19/lib/libclang.so DEV=CPU PYTHONUNBUFFERED=1 python3 -m pytest -n 0 -m "prototype" --timeout=30 --timeout-method=signal $test_file || true; done; } ; rm -f /dev/shm/coralnpu_$$_* && env LIBCLANG_PATH=/usr/lib/llvm-19/lib/libclang.so DEV=CPU PYTHONUNBUFFERED=1 python3 -m pytest -x -n 0 -m "not prototype" --timeout=30 --timeout-method=signal --cov=tinygrad --cov-report=html test/test_tinygrad_hardware_blockers.py test/backend/ test/unit/ test/null/ test/test_tiny.py test/test_coralnpu_e2e.py test/test_coralnpu_renderer.py test/test_ping_pong_address_overlap.py test/test_pytest_xdist_teardown_integration.py test/test_cross_compiler_matrix.py test/models/test_gemma_decomposition.py test/test_coralnpu_ipc.py test/test_coralnpu_suites.py test/test_w8a8_late_dequantization.py test/test_coral_macros.py test/test_tuner_gradients.py test/test_sequential_dependencies.py
